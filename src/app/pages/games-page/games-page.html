<app-button label="← Terug" routerLink="/admin" />

<app-card [title]="games().length.toString()" description="Games" />

<div>
  <div class="graph">
    <highcharts-chart [options]="chartOptions" style="width: 100%; height: 400px; display: block" />
  </div>

  <h2 class="title">Games</h2>

  <div class="games">
    @for (game of games(); track $index) {
      <div class="game">
        <p>
          <b>API:</b>
          {{ game.api }}
        </p>

        <p>
          <b>Score:</b>
          {{ game.score }}
        </p>

        <p>
          <b>Datum:</b>
          {{ game.day }}
        </p>
      </div>
    }
  </div>
</div>
