<div class="login">


	<form (ngSubmit)="onLogin()">
		<h1>
			Login
		</h1>

		<label>
			Gebruikersnaam
		</label>

		<input type="text" [(ngModel)]="username" name="username" required />

		<label>
			Wachtwoord
		</label>

		<input type="password" [(ngModel)]="password" name="password" required />

		<button type="submit">
			Inloggen
		</button>

		<p *ngIf="error" class="error">
			{{error}}
		</p>
	</form>


</div>
