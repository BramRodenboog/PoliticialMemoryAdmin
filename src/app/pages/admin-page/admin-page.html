<div class="dashboard">
  <h1>Admin Dashboard</h1>

  <div class="stats">
    <app-card
      [title]="userCount().toString()"
      description="Gebruikers"
      link="/users"
      linkText="Bekijk spelers →"
    />

    <app-card
      [title]="gameCount().toString()"
      description="Games"
      link="/games"
      linkText="Bekijk games →"
    />
  </div>

  <h2>Populaire API's</h2>

  <div class="graph">
    <highcharts-chart
      [options]="chartOptions"
      style="width: 100%; height: 400px; display: block"
    />
  </div>
</div>
